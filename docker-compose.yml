services:
  redis:
    image: redis:7-alpine
    container_name: secagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - secagent-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secagent-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./app.db
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      - ./backend:/app
      - backend-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - secagent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secagent-celery
    command: celery -A app.celery_app worker --loglevel=info --concurrency=3
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./app.db
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    volumes:
      - ./backend:/app
      - backend-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - secagent-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secagent-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - secagent-network

volumes:
  redis-data:
  backend-data:

networks:
  secagent-network:
    driver: bridge